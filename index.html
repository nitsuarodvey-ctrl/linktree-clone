<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gün 5 - Alphi Links</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .preview-mobile { width: 375px; height: 667px; border: 12px solid #1e232e; border-radius: 40px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col md:flex-row">

    <aside class="w-full md:w-1/2 p-8 border-r border-slate-200 overflow-y-auto">
        <h1 class="text-2xl font-bold mb-6 text-indigo-600">Alphi Links Editor</h1>
        
        <div class="space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm space-y-4">
                <h3 class="text-sm font-bold text-slate-400 uppercase">Profil Ayarları</h3>
                <input id="in-name" oninput="sync()" type="text" placeholder="Adın veya Markan" class="w-full p-2 border rounded" value='Alperen "Alphi" Dündar'>
                <textarea id="in-bio" oninput="sync()" placeholder="Kısa bi' şeyler yaz..." class="w-full p-2 border rounded">Web Developer & Designer</textarea>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm space-y-4">
                <div class="flex justify-between items-center">
                    <h3 class="text-sm font-bold text-slate-400 uppercase">Linklerin</h3>
                    <button onclick="addLink()" class="bg-indigo-600 text-white px-3 py-1 rounded text-sm">+ Yeni Ekle</button>
                </div>
                <div id="links-editor" class="space-y-3">
                </div>

                <div class="flex flex-col gap-2">
    <label class="text-xs font-bold text-slate-500 uppercase">Profil Fotoğrafı</label>
    <input type="file" accept="image/*" onchange="updatePP(this)" 
           class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer"/>
</div>
            </div>
        </div>
    </aside>

    <main class="w-full md:w-1/2 bg-slate-200 flex items-center justify-center p-8 sticky top-0 h-screen">
        <div id="mobile-view" class="preview-mobile bg-white shadow-2xl overflow-hidden flex flex-col items-center p-8 relative">
            <div id="preview-bg" class="absolute inset-0 z-0 bg-gradient-to-b from-indigo-500 to-purple-600"></div>
            
            <div class="relative z-10 w-full flex flex-col items-center">
                <div class="size-24 bg-white rounded-full mb-4 shadow-lg overflow-hidden border-4 border-white/20">
                    <img id="preview-avatar" src="https://ui-avatars.com/api/?name=Alphi&background=random" class="w-full h-full object-cover">
                </div>
                <h2 id="preview-name" class="text-white text-xl font-bold mb-1">Alperen "Alphi" Dündar</h2>
                <p id="preview-bio" class="text-white/80 text-sm mb-8 text-center">Web Developer & Designer</p>
                
                <div id="preview-links" class="w-full space-y-4">
                </div>
            </div>
        </div>
    </main>

    <script>
        let links = [
    { title: 'Portfolio', url: 'https://alphi.dev' },
    { title: 'Instagram', url: '#' }
];

function sync() {
    // Sadece önizlemeyi güncelliyoruz, editöre dokunmuyoruz ki focus gitmesin
    document.getElementById('preview-name').innerText = document.getElementById('in-name').value;
    document.getElementById('preview-bio').innerText = document.getElementById('in-bio').value;
    renderPreview();
}

function updateLink(index, field, value) {
    links[index][field] = value;
    renderPreview();
}

function addLink() {
    links.push({ title: 'Yeni Link', url: '#' });
    renderEditor(); // Yeni eleman eklenince editörü baştan çizmek şart
    renderPreview();
}

function removeLink(index) {
    links.splice(index, 1);
    renderEditor();
    renderPreview();
}

function renderEditor() {
    const editor = document.getElementById('links-editor');
    editor.innerHTML = '';
    links.forEach((l, i) => {
        editor.innerHTML += `
            <div class="p-3 bg-slate-50 rounded border flex items-center gap-2 group">
                <div class="flex-1 space-y-2">
                    <input oninput="updateLink(${i}, 'title', this.value)" class="w-full p-1 text-sm border-b focus:border-indigo-500 outline-none" value="${l.title}" placeholder="Başlık">
                    <input oninput="updateLink(${i}, 'url', this.value)" class="w-full p-1 text-sm border-b focus:border-indigo-500 outline-none" value="${l.url}" placeholder="URL">
                </div>
                <button onclick="removeLink(${i})" class="text-red-400 opacity-0 group-hover:opacity-100 transition-opacity">
                    <span class="material-symbols-outlined text-sm">delete</span>
                </button>
            </div>
        `;
    });
}

function renderPreview() {
    const preview = document.getElementById('preview-links');
    preview.innerHTML = '';
    links.forEach((l) => {
        preview.innerHTML += `
            <a href="${l.url}" target="_blank" class="block w-full py-3 px-6 bg-white/20 backdrop-blur-md border border-white/30 text-white text-center rounded-full font-semibold hover:scale-105 transition-transform">
                ${l.title}
            </a>
        `;
    });
}

function updatePP(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('preview-avatar').src = e.target.result;
        }
        reader.readAsDataURL(input.files[0]);
    }
}

// İlk açılışta ikisini de çalıştır
renderEditor();
renderPreview();
    </script>
</body>
</html>
